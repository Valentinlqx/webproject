<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>Workout Creator — Crée ton séance d'entraînement</title>
  <meta name="description" content="Crée des séances d'entraînement personnalisées en quelques clics." />
  <meta name="theme-color" content="#0a0a0a" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✦</text></svg>" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <div class="header-controls">
      <a href="../../mes-projets.html" class="icon-btn" id="back-btn" title="Retour">←</a>
    </div>
    <div class="hero">
      <h1>Workout Creator</h1>
      <p class="hero-sub">Crée des séances d'entraînement personnalisées</p>
    </div>
  </header>

  <main class="app-container">
    <!-- Form Section -->
    <section class="form-section">
      <div class="form-card">
        <h2>Nouvelle séance</h2>

        <form id="workout-form">
          <div class="form-group">
            <label for="workout-name">Nom de la séance</label>
            <input type="text" id="workout-name" placeholder="Ex: Upper Body Push" required />
          </div>

          <div class="form-group">
            <label for="workout-duration">Durée (min)</label>
            <input type="number" id="workout-duration" placeholder="45" min="5" max="180" value="45" />
          </div>

          <div class="form-group">
            <label for="workout-difficulty">Difficulté</label>
            <select id="workout-difficulty">
              <option value="débutant">Débutant</option>
              <option value="intermédiaire" selected>Intermédiaire</option>
              <option value="avancé">Avancé</option>
            </select>
          </div>

          <fieldset class="form-group">
            <legend>Type d'entraînement</legend>
            <div class="checkbox-group">
              <label><input type="checkbox" name="type" value="force" /> Force</label>
              <label><input type="checkbox" name="type" value="cardio" /> Cardio</label>
              <label><input type="checkbox" name="type" value="flexibilité" /> Flexibilité</label>
              <label><input type="checkbox" name="type" value="hiit" /> HIIT</label>
            </div>
          </fieldset>

          <button type="submit" class="btn-primary">Créer la séance</button>
        </form>
      </div>
    </section>

    <!-- Workout Display Section -->
    <section class="workout-section" id="workout-section" hidden>
      <div class="workout-card">
        <div class="workout-header">
          <h2 id="display-name"></h2>
          <button class="icon-btn" id="edit-btn" title="Modifier">✏️</button>
        </div>

        <div class="workout-info">
          <div class="info-item">
            <span class="label">Durée</span>
            <span id="display-duration"></span>
          </div>
          <div class="info-item">
            <span class="label">Difficulté</span>
            <span id="display-difficulty"></span>
          </div>
          <div class="info-item">
            <span class="label">Type</span>
            <span id="display-type"></span>
          </div>
        </div>

        <div class="workout-exercises">
          <h3>Exercices</h3>
          <div id="exercises-list"></div>
          <button class="btn-ghost" id="add-exercise-btn">+ Ajouter un exercice</button>
        </div>

        <div class="workout-actions">
          <button class="btn-primary" id="save-btn">Enregistrer</button>
          <button class="btn-ghost" id="reset-btn">Nouvelle séance</button>
        </div>
      </div>
    </section>
  </main>

  <!-- Modal for adding exercises -->
  <dialog id="exercise-modal">
    <div class="modal-card">
      <div class="modal-head">
        <h3>Ajouter un exercice</h3>
        <button class="icon-btn" id="modal-close" type="button">✕</button>
      </div>

      <form id="exercise-form">
        <div class="form-group">
          <label for="exercise-name">Nom</label>
          <input type="text" id="exercise-name" placeholder="Ex: Pompes" required />
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="exercise-sets">Séries</label>
            <input type="number" id="exercise-sets" value="3" min="1" max="10" />
          </div>
          <div class="form-group">
            <label for="exercise-reps">Reps</label>
            <input type="number" id="exercise-reps" value="10" min="1" max="100" />
          </div>
        </div>

        <div class="form-group">
          <label for="exercise-rest">Repos (sec)</label>
          <input type="number" id="exercise-rest" value="60" min="0" max="300" />
        </div>

        <div class="form-actions">
          <button type="submit" class="btn-primary">Ajouter</button>
          <button type="button" class="btn-ghost" id="modal-cancel">Annuler</button>
        </div>
      </form>
    </div>
  </dialog>

  <script src="script.js"></script>
</body>
</html>
